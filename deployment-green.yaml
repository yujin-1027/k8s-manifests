apiVersion: apps/v1
kind: Deployment
metadata:
  name: a3028-green            # 이름 다르게!
spec:
  replicas: 3
  selector:
    matchLabels:
      app: a3028-zero-dtd-test
      version: 2.0.0           # [핵심] 버전 2.0.0
  template:
    metadata:
      labels:
        app: a3028-zero-dtd-test
        version: 2.0.0
    spec:
      containers:
      - name: app
        image: <유진님의 V2 이미지 주소> # 아까 물결표(~~) 나오는 그 이미지!
        ports:
        - containerPort: 8080